# Fizzy deployment to vmattoo.dev's Azure VM. Caddy (in the personal-website
# repo) handles TLS at tasks.vmattoo.dev and proxies to fizzy-web:80 over
# the shared Docker network vmattoo-shared. Kamal's own proxy is disabled.

service: fizzy
image: vaibhav-mattoo/fizzy

servers:
  web:
    hosts:
      - 23.100.73.113
    options:
      network: vmattoo-shared
      network-alias: fizzy-web

proxy: false

ssh:
  user: vaibhav

registry:
  server: ghcr.io
  username: vaibhav-mattoo
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    BASE_URL: https://tasks.vmattoo.dev
    MAILER_FROM_ADDRESS: noreply@vmattoo.dev
    MULTI_TENANT: "false"
  secret:
    - SECRET_KEY_BASE
    - VAPID_PUBLIC_KEY
    - VAPID_PRIVATE_KEY

builder:
  arch: amd64

volumes:
  - "fizzy_storage:/rails/storage"
